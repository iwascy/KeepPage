<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KeepPage 首页重构示例</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --background: #f7f8fb;
        --surface: rgba(255, 255, 255, 0.74);
        --surface-solid: #ffffff;
        --surface-soft: #eff2f5;
        --surface-muted: #e6eaee;
        --text: #1f252a;
        --text-muted: #67717a;
        --text-soft: #93a0ab;
        --line-soft: rgba(163, 171, 178, 0.18);
        --brand: #575757;
        --brand-deep: #444444;
        --success: #1f7a57;
        --warning: #9a6a1d;
        --danger: #b2414a;
        --shadow: 0 24px 48px rgba(45, 51, 56, 0.08);
        --radius-xl: 34px;
        --radius-lg: 28px;
        --radius-md: 22px;
        --sidebar-width: 280px;
        --header-height: 72px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 12% 6%, rgba(255, 215, 184, 0.8), transparent 24%),
          radial-gradient(circle at 86% 9%, rgba(221, 232, 255, 0.88), transparent 22%),
          linear-gradient(180deg, #fbfbfd 0%, #f3f5f8 100%);
      }

      body::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(120deg, rgba(255, 255, 255, 0.55), transparent 48%),
          radial-gradient(circle at 72% 64%, rgba(255, 255, 255, 0.45), transparent 30%);
      }

      button,
      input {
        font: inherit;
      }

      .app {
        min-height: 100vh;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        width: var(--sidebar-width);
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding: 22px 18px;
        background: rgba(255, 255, 255, 0.52);
        backdrop-filter: blur(34px);
        -webkit-backdrop-filter: blur(34px);
        box-shadow: 10px 0 42px rgba(45, 51, 56, 0.05);
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 8px 6px;
      }

      .brand-mark {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        color: #ffffff;
        font-size: 18px;
        font-weight: 800;
        background: linear-gradient(135deg, #666666, #454545);
        box-shadow: 0 16px 28px rgba(87, 87, 87, 0.24);
      }

      .brand h1 {
        margin: 0;
        font-size: 22px;
        line-height: 1.05;
        letter-spacing: -0.03em;
      }

      .brand p {
        margin: 5px 0 0;
        font-size: 11px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-soft);
        font-weight: 700;
      }

      .search {
        position: relative;
      }

      .search input {
        width: 100%;
        height: 52px;
        border: 0;
        outline: none;
        padding: 0 18px 0 46px;
        border-radius: 999px;
        color: var(--text);
        background: rgba(239, 242, 245, 0.96);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.72);
      }

      .search input::placeholder {
        color: #97a2ad;
      }

      .search-icon {
        position: absolute;
        left: 18px;
        top: 50%;
        transform: translateY(-50%);
        width: 16px;
        height: 16px;
        border: 2px solid #a2adb8;
        border-radius: 50%;
      }

      .search-icon::after {
        content: "";
        position: absolute;
        right: -6px;
        bottom: -5px;
        width: 8px;
        height: 2px;
        border-radius: 999px;
        background: #a2adb8;
        transform: rotate(42deg);
      }

      .sidebar-section {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 6px;
      }

      .section-head span {
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--text-soft);
      }

      .nav-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .folder-row {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .folder-main {
        --depth: 0;
        border: 0;
        width: 100%;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        padding-left: calc(12px + (var(--depth) * 14px));
        border-radius: 18px;
        color: var(--text-muted);
        cursor: pointer;
        text-align: left;
        background: transparent;
        transition: transform 160ms ease, background 160ms ease, color 160ms ease, box-shadow 160ms ease;
      }

      .folder-main:hover {
        transform: translateX(2px);
        color: var(--text);
      }

      .folder-main.is-active {
        color: var(--text);
        background: rgba(255, 255, 255, 0.92);
        box-shadow: 0 12px 26px rgba(45, 51, 56, 0.07);
      }

      .folder-main.is-child {
        position: relative;
      }

      .folder-main.is-child::before {
        content: "";
        position: absolute;
        left: calc(12px + ((var(--depth) - 1) * 14px) + 7px);
        top: 50%;
        width: 10px;
        height: 1px;
        border-radius: 999px;
        background: rgba(156, 166, 176, 0.45);
      }

      .folder-main-left {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        flex: 1;
      }

      .folder-copy {
        min-width: 0;
      }

      .folder-copy strong {
        display: block;
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .folder-count {
        flex: 0 0 auto;
        min-width: 24px;
        padding: 4px 7px;
        border-radius: 999px;
        background: rgba(239, 242, 245, 0.95);
        color: #7c8791;
        font-size: 10px;
        font-weight: 700;
        text-align: center;
      }

      .folder-toggle {
        flex: 0 0 auto;
        width: 26px;
        height: 26px;
        border: 0;
        border-radius: 10px;
        display: grid;
        place-items: center;
        background: rgba(239, 242, 245, 0.96);
        color: #7b8790;
        cursor: pointer;
        transition: transform 160ms ease, background 160ms ease;
      }

      .folder-toggle:hover {
        background: rgba(232, 236, 240, 1);
      }

      .folder-toggle.is-collapsed {
        transform: rotate(-90deg);
      }

      .tag-list {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        padding: 0 4px;
      }

      .tag-chip {
        border: 0;
        border-radius: 999px;
        padding: 10px 14px;
        font-size: 12px;
        font-weight: 700;
        color: #75808a;
        cursor: pointer;
        background: rgba(235, 239, 243, 0.96);
        transition: transform 160ms ease, background 160ms ease, color 160ms ease;
      }

      .tag-chip:hover {
        transform: translateY(-1px);
      }

      .tag-chip.is-active {
        color: #ffffff;
        background: linear-gradient(135deg, #666666, #4a4a4a);
        box-shadow: 0 12px 22px rgba(74, 74, 74, 0.22);
      }

      .sidebar-footer {
        margin-top: auto;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }

      .cta-button {
        border: 0;
        height: 52px;
        border-radius: 999px;
        color: #ffffff;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        background: linear-gradient(135deg, var(--brand), var(--brand-deep));
        box-shadow: 0 22px 38px rgba(82, 82, 82, 0.2);
      }

      .sidebar-tools {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 8px;
        color: #7d8791;
        font-size: 14px;
        font-weight: 700;
      }

      .shell {
        margin-left: var(--sidebar-width);
        min-height: 100vh;
      }

      .topbar {
        position: fixed;
        top: 0;
        left: var(--sidebar-width);
        right: 0;
        height: var(--header-height);
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 20px;
        padding: 14px 28px;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);
        box-shadow: 0 18px 36px rgba(45, 51, 56, 0.04);
        z-index: 10;
      }

      .topbar-right {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .profile {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .profile-copy {
        text-align: right;
      }

      .profile-copy strong {
        display: block;
        font-size: 14px;
      }

      .avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        display: grid;
        place-items: center;
        font-size: 14px;
        font-weight: 800;
        color: #ffffff;
        background: linear-gradient(135deg, #9ab6ff, #ffd6ae);
        box-shadow: 0 14px 24px rgba(109, 130, 170, 0.18);
      }

      .content {
        padding: calc(var(--header-height) + 18px) 28px 42px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 26px;
      }

      .card {
        position: relative;
        display: flex;
        flex-direction: column;
        min-height: 290px;
        padding: 20px;
        border-radius: var(--radius-xl);
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 18px 38px rgba(45, 51, 56, 0.05);
        transition: transform 220ms ease, box-shadow 220ms ease, background 220ms ease;
        overflow: hidden;
      }

      .card:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow);
        background: rgba(255, 255, 255, 0.94);
      }

      .card.has-cover {
        padding: 0;
      }

      .card-cover {
        position: relative;
        height: 220px;
        overflow: hidden;
      }

      .cover-badge {
        position: absolute;
        top: 18px;
        right: 18px;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.84);
        color: #44505a;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        backdrop-filter: blur(12px);
      }

      .cover-scene {
        position: absolute;
        inset: 0;
      }

      .cover-scene.design {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.22), transparent 40%),
          linear-gradient(145deg, #ffb68b, #ffd6bc);
      }

      .cover-scene.design::before {
        content: "";
        position: absolute;
        left: 56px;
        top: 28px;
        width: 128px;
        height: 154px;
        border-radius: 2px;
        background:
          linear-gradient(180deg, rgba(233, 236, 239, 0.96), rgba(255, 255, 255, 1)),
          #ffffff;
        box-shadow: 0 18px 34px rgba(74, 58, 47, 0.22);
        transform: rotate(-2deg);
      }

      .cover-scene.design::after {
        content: "";
        position: absolute;
        left: 76px;
        top: 52px;
        width: 82px;
        height: 46px;
        border-top: 2px solid rgba(43, 49, 54, 0.18);
        border-bottom: 2px solid rgba(43, 49, 54, 0.1);
        opacity: 0.7;
      }

      .cover-scene.warm {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.12), transparent 50%),
          linear-gradient(145deg, #f7e1b5, #d7ad61);
      }

      .cover-scene.warm::before {
        content: "";
        position: absolute;
        left: 42px;
        bottom: 28px;
        width: 132px;
        height: 12px;
        border-radius: 999px;
        background: rgba(112, 79, 34, 0.14);
        box-shadow:
          74px -46px 0 18px rgba(255, 255, 255, 0.3),
          34px -26px 0 9px rgba(166, 129, 67, 0.28);
      }

      .cover-scene.warm::after {
        content: "";
        position: absolute;
        top: 0;
        left: 100px;
        width: 2px;
        height: 74px;
        background: rgba(117, 87, 47, 0.58);
        box-shadow: 0 74px 0 13px rgba(157, 121, 63, 0.24);
      }

      .cover-scene.code {
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.26), transparent 42%),
          linear-gradient(145deg, #dfe6f2, #b8c4da);
      }

      .cover-scene.code::before {
        content: "";
        position: absolute;
        inset: 28px 36px 34px;
        border-radius: 24px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.68), rgba(245, 248, 252, 0.9));
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.78);
      }

      .cover-scene.code::after {
        content: "";
        position: absolute;
        left: 62px;
        top: 60px;
        width: 124px;
        height: 78px;
        background:
          linear-gradient(rgba(99, 111, 130, 0.2) 0 0) 0 0 / 84px 2px no-repeat,
          linear-gradient(rgba(99, 111, 130, 0.16) 0 0) 0 16px / 128px 2px no-repeat,
          linear-gradient(rgba(99, 111, 130, 0.12) 0 0) 0 32px / 98px 2px no-repeat,
          linear-gradient(rgba(99, 111, 130, 0.14) 0 0) 0 48px / 110px 2px no-repeat,
          linear-gradient(rgba(99, 111, 130, 0.1) 0 0) 0 64px / 74px 2px no-repeat;
      }

      .card-body {
        display: flex;
        flex: 1;
        flex-direction: column;
        padding: 20px 22px 22px;
      }

      .card-label {
        align-self: flex-end;
        padding: 7px 11px;
        border-radius: 999px;
        background: rgba(236, 240, 244, 0.92);
        color: #74818d;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .card-label.light {
        background: rgba(255, 255, 255, 0.7);
      }

      .card h4 {
        margin: 16px 0 0;
        font-size: 19px;
        line-height: 1.2;
        letter-spacing: -0.03em;
      }

      .card p {
        margin: 12px 0 0;
        color: var(--text-muted);
        font-size: 14px;
        line-height: 1.7;
      }

      .card-footer {
        margin-top: auto;
        padding-top: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .bookmark-domain,
      .bookmark-time {
        color: #8b96a1;
        font-size: 12px;
        font-weight: 700;
      }

      .bookmark-domain {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .bookmark-time {
        flex: 0 0 auto;
        text-align: right;
        white-space: nowrap;
      }

      .empty {
        display: none;
        align-items: center;
        justify-content: center;
        min-height: 280px;
        border-radius: var(--radius-xl);
        background: rgba(255, 255, 255, 0.64);
        color: var(--text-muted);
        font-size: 15px;
        box-shadow: 0 18px 34px rgba(45, 51, 56, 0.04);
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 24px;
        margin-top: 34px;
        color: #a2adb7;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      @media (max-width: 1100px) {
        .sidebar {
          position: static;
          width: auto;
          height: auto;
          margin: 18px;
          border-radius: 30px;
        }

        .shell {
          margin-left: 0;
        }

        .topbar {
          position: static;
          height: auto;
          margin: 0 18px;
          border-radius: 30px;
        }

        .content {
          padding: 26px 18px 34px;
        }

      }

      @media (max-width: 720px) {
        .topbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .topbar-right {
          width: 100%;
          justify-content: space-between;
          flex-wrap: wrap;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">K</div>
          <div>
            <h1>KeepPage</h1>
            <p>Your Archive Space</p>
          </div>
        </div>

        <label class="search">
          <span class="search-icon" aria-hidden="true"></span>
          <input id="searchInput" type="search" placeholder="搜索标题、域名、标签..." />
        </label>

        <section class="sidebar-section">
          <div class="section-head">
            <span>Collections</span>
          </div>
          <div id="folderNav" class="nav-list"></div>
        </section>

        <section class="sidebar-section">
          <div class="section-head">
            <span>Tags</span>
          </div>
          <div id="tagNav" class="tag-list"></div>
        </section>

        <div class="sidebar-footer">
          <button class="cta-button" type="button">+ 新建导入</button>
          <div class="sidebar-tools">
            <span>设置</span>
            <span>帮助</span>
          </div>
        </div>
      </aside>

      <div class="shell">
        <header class="topbar">
          <div class="topbar-right">
            <div class="profile">
              <div class="profile-copy">
                <strong>Cyan</strong>
              </div>
              <div class="avatar">CY</div>
            </div>
          </div>
        </header>

        <main class="content">
          <section id="cardGrid" class="grid"></section>
          <section id="emptyState" class="empty">当前筛选下没有匹配的归档。</section>

          <footer class="footer">
            <span>Privacy</span>
            <span>Terms</span>
            <span>Support</span>
            <span>KeepPage Mockup</span>
          </footer>
        </main>
      </div>
    </div>

        },
        {
          id: "7",
          folder: "life-reading",
          label: "生活方式",
          title: "Reading Rituals for Long-form Research",
          summary: "关于长文阅读节奏、批注方法和收藏归档习惯的个人实践。",
          tags: ["reading", "archive"],
          domain: "notes.example",
          savedAt: "上周",
          hasPreview: false,
        },
      ];

      const state = {
        folder: "all",
        tag: "all",
        search: "",
      };

      const folderNav = document.getElementById("folderNav");
      const tagNav = document.getElementById("tagNav");
      const cardGrid = document.getElementById("cardGrid");
      const emptyState = document.getElementById("emptyState");
      const searchInput = document.getElementById("searchInput");

      const folderMap = new Map(folders.map((folder) => [folder.id, folder]));
      const collapsedFolders = new Set(["development", "lifestyle"]);

      function getDescendantFolderIds(folderId) {
        if (folderId === "all") {
          return folders.filter((folder) => folder.id !== "all").map((folder) => folder.id);
        }

        const ids = [folderId];
        for (const folder of folders) {
          if (folder.parentId === folderId) {
            ids.push(...getDescendantFolderIds(folder.id));
          }
        }
        return ids;
      }

      function getFolderCount(folderId) {
        if (folderId === "all") {
          return bookmarks.length;
        }

        const visibleFolderIds = new Set(getDescendantFolderIds(folderId));
        return bookmarks.filter((bookmark) => visibleFolderIds.has(bookmark.folder)).length;
      }

      function hasChildFolders(folderId) {
        return folders.some((folder) => folder.parentId === folderId);
      }

      function isFolderVisible(folder) {
        if (!folder.parentId) {
          return true;
        }
        return !collapsedFolders.has(folder.parentId);
      }

      function renderFolders() {
        folderNav.innerHTML = folders
          .filter(isFolderVisible)
          .map(
            (folder) => `
              <div class="folder-row" style="--depth: ${folder.depth || 0};">
                <button
                  class="folder-main ${state.folder === folder.id ? "is-active" : ""} ${folder.depth > 0 ? "is-child" : ""}"
                  data-folder="${folder.id}"
                  type="button"
                  style="--depth: ${folder.depth || 0};"
                >
                  <span class="folder-main-left">
                    <span class="folder-copy">
                      <strong>${folder.name}</strong>
                    </span>
                  </span>
                  <span class="folder-count">${getFolderCount(folder.id)}</span>
                </button>
                ${hasChildFolders(folder.id) ? `
                  <button
                    class="folder-toggle ${collapsedFolders.has(folder.id) ? "is-collapsed" : ""}"
                    data-toggle-folder="${folder.id}"
                    type="button"
                    aria-label="${collapsedFolders.has(folder.id) ? "展开" : "收起"} ${folder.name}"
                  >
                    ▾
                  </button>
                ` : ""}
              </div>
            `,
          )
          .join("");

        folderNav.querySelectorAll("[data-folder]").forEach((button) => {
          button.addEventListener("click", () => {
            state.folder = button.getAttribute("data-folder");
            render();
          });
        });

        folderNav.querySelectorAll("[data-toggle-folder]").forEach((button) => {
          button.addEventListener("click", () => {
            const folderId = button.getAttribute("data-toggle-folder");
            if (!folderId) {
              return;
            }
            if (collapsedFolders.has(folderId)) {
              collapsedFolders.delete(folderId);
            } else {
              const descendants = getDescendantFolderIds(folderId);
              if (state.folder !== folderId && descendants.includes(state.folder)) {
                state.folder = folderId;
              }
              collapsedFolders.add(folderId);
            }
            render();
          });
        });
      }

      function renderTags() {
        tagNav.innerHTML = tags
          .map(
            (tag) => `
              <button class="tag-chip ${state.tag === tag.id ? "is-active" : ""}" data-tag="${tag.id}" type="button">
                ${tag.label}
              </button>
            `,
          )
          .join("");

        tagNav.querySelectorAll("[data-tag]").forEach((button) => {
          button.addEventListener("click", () => {
            state.tag = button.getAttribute("data-tag");
            render();
          });
        });
      }

      function renderCards(filtered) {
        cardGrid.innerHTML = filtered
          .map((bookmark) => {
            if (bookmark.hasPreview) {
              return `
                <article class="card has-cover">
                  <div class="card-cover">
                    <div class="cover-scene ${bookmark.coverStyle}"></div>
                    <span class="cover-badge">${bookmark.label}</span>
                  </div>
                  <div class="card-body">
                    <h4>${bookmark.title}</h4>
                    <p>${bookmark.summary}</p>
                    <div class="card-footer">
                      <div class="bookmark-domain">${bookmark.domain}</div>
                      <div class="bookmark-time">${bookmark.savedAt}</div>
                    </div>
                  </div>
                </article>
              `;
            }

            return `
              <article class="card">
                <span class="card-label">${bookmark.label}</span>
                <h4>${bookmark.title}</h4>
                <p>${bookmark.summary}</p>
                <div class="card-footer">
                  <div class="bookmark-domain">${bookmark.domain}</div>
                  <div class="bookmark-time">${bookmark.savedAt}</div>
                </div>
              </article>
            `;
          })
          .join("");
      }

      function getFilteredBookmarks() {
        const keyword = state.search.trim().toLowerCase();
        return bookmarks.filter((bookmark) => {
          const folderIds = state.folder === "all" ? null : new Set(getDescendantFolderIds(state.folder));
          const matchFolder = !folderIds || folderIds.has(bookmark.folder);
          const matchTag = state.tag === "all" || bookmark.tags.includes(state.tag);
          const searchHaystack = `${bookmark.title} ${bookmark.summary} ${bookmark.domain} ${bookmark.tags.join(" ")}`
            .toLowerCase();
          const matchSearch = !keyword || searchHaystack.includes(keyword);
          return matchFolder && matchTag && matchSearch;
        });
      }

      function updateHeader(filtered) {
        const activeFolder = folderMap.get(state.folder);
        const activeTag = tags.find((tag) => tag.id === state.tag);
        const titleParts = [];

        if (activeFolder && state.folder !== "all") {
          titleParts.push(activeFolder.name);
        }
        if (activeTag && state.tag !== "all") {
          titleParts.push(activeTag.label);
        }
        if (state.search.trim()) {
          titleParts.push(state.search.trim());
        }

        document.title = titleParts.length > 0
          ? `${titleParts.join(" · ")} - KeepPage`
          : "KeepPage 首页重构示例";
      }

      function render() {
        const filtered = getFilteredBookmarks();
        renderFolders();
        renderTags();
        updateHeader(filtered);
        renderCards(filtered);
        emptyState.style.display = filtered.length === 0 ? "flex" : "none";
        cardGrid.style.display = filtered.length === 0 ? "none" : "grid";
      }

      searchInput.addEventListener("input", (event) => {
        state.search = event.target.value;
        render();
      });

      render();
    </script>
  </body>
</html>
