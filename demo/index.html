          showToast(`已生成 ${state.importPreview.length} 条预览`);
          render();
        }
        if (action === "start-import") startImport();
        if (action === "retry-import") showToast("已重新排队失败项");
        if (action === "unlock-private") {
          state.privateUnlocked = true;
          showToast("已进入私密空间");
          render();
        }
        if (action === "lock-private") {
          state.privateUnlocked = false;
          showToast("已退出私密模式");
          render();
        }
        if (action === "export") showToast("已生成 keeppage-demo.html");
        if (action === "edit-note") openNoteDialog();
        if (action === "logout") showToast("Demo 模式不需要登录");
        if (action === "noop") showToast("演示中子收藏夹默认展开");
      }

      function openContext(type, id, event) {
        state.context = { type, id, x: event.clientX + 4, y: event.clientY + 4 };
        state.dialog = null;
        render();
      }

      function openDialog(type, id) {
        if (type === "create-folder-child" && state.context?.type === "folder") id = state.context.id;
        if (type === "edit-folder" && state.context?.type === "folder") id = state.context.id;
        if (type === "delete-folder" && state.context?.type === "folder") id = state.context.id;
        if (type === "edit-tag" && state.context?.type === "tag") id = state.context.id;
        if (type === "delete-tag" && state.context?.type === "tag") id = state.context.id;
        if (type === "move-bookmark" && state.context?.type === "bookmark") id = state.context.id;
        state.dialog = { type, id };
        state.context = null;
        renderOverlay();
      }

      function submitDialog() {
        const dialog = state.dialog;
        const name = document.querySelector("[data-dialog-input='name']")?.value.trim();
        const color = document.querySelector("[data-dialog-input='color']")?.value.trim();
        const folderValue = document.querySelector("[data-dialog-input='folder']")?.value || null;
        if (dialog.type === "create-folder" || dialog.type === "create-folder-child") {
          const parent = dialog.type === "create-folder-child" ? folders.find((item) => item.id === dialog.id) : null;
          const path = name.startsWith("/") ? name : `${parent ? parent.path : ""}/${name}`.replace(/\/+/g, "/");
          folders.push({ id: `f-${Date.now()}`, name: path.split("/").filter(Boolean).pop() || "New", path, parentId: parent?.id || null });
          showToast("收藏夹已创建");
        } else if (dialog.type === "edit-folder") {
          const folder = folders.find((item) => item.id === dialog.id);
          if (folder && name) {
            folder.path = name.startsWith("/") ? name : `/${name}`;
            folder.name = folder.path.split("/").filter(Boolean).pop() || folder.name;
            showToast("收藏夹已更新");
          }
        } else if (dialog.type === "delete-folder") {
          folders.splice(folders.findIndex((item) => item.id === dialog.id), 1);
          bookmarks.forEach((item) => {
            if (item.folderId === dialog.id) {
              item.folderId = null;
              syncBookmarkLinks(item);
            }
          });
          showToast("收藏夹已删除");
        } else if (dialog.type === "create-tag") {
          tags.push({ id: `t-${Date.now()}`, name: name || "new-tag", color: color || "#2f6f73" });
          showToast("标签已创建");
        } else if (dialog.type === "edit-tag") {
          const tag = tags.find((item) => item.id === dialog.id);
          if (tag) {
            tag.name = name || tag.name;
            tag.color = color || tag.color;
            [...bookmarks, ...privateBookmarks].forEach(syncBookmarkLinks);
            showToast("标签已更新");
          }
        } else if (dialog.type === "delete-tag") {
          tags.splice(tags.findIndex((item) => item.id === dialog.id), 1);
          [...bookmarks, ...privateBookmarks].forEach((item) => {
            item.tagIds = item.tagIds.filter((id) => id !== dialog.id);
            syncBookmarkLinks(item);
          });
          showToast("标签已删除");
        } else if (dialog.type === "move-bookmark") {
          const item = bookmarks.find((bookmark) => bookmark.id === dialog.id);
          if (item) {
            item.folderId = folderValue;
            syncBookmarkLinks(item);
          }
          showToast("书签已移动");
        } else if (dialog.type === "batch-move") {
          bookmarks.filter((item) => state.selectedIds.has(item.id)).forEach((item) => {
            item.folderId = folderValue;
            syncBookmarkLinks(item);
          });
          showToast("所选书签已移动");
        } else if (dialog.type === "delete-bookmark") {
          const id = dialog.id || state.bookmarkId;
          bookmarks = bookmarks.filter((item) => item.id !== id);
          state.selectedIds.delete(id);
          showToast("书签已删除");
          if (state.page === "detail") state.page = "list";
        } else if (dialog.type === "batch-delete") {
          bookmarks = bookmarks.filter((item) => !state.selectedIds.has(item.id));
          state.selectedIds.clear();
          state.selectionMode = false;
          showToast("所选书签已删除");
        } else if (dialog.type === "create-token") {
          const id = `tok-${Date.now()}`;
          const secret = `kp_live_${Math.random().toString(36).slice(2)}_${Math.random().toString(36).slice(2)}`;
          apiTokens.unshift({ id, name: name || "Demo token", prefix: secret.slice(0, 12), createdAt: now.toISOString(), expiresAt: null, revokedAt: null });
          state.createdTokenSecret = secret;
          showToast("API 密钥已创建");
        }
        state.dialog = null;
        render();
      }

      function handleContextAction(action) {
        if (!state.context || state.context.type !== "bookmark") return;
        const item = bookmarks.find((bookmark) => bookmark.id === state.context.id);
        if (!item) return;
        if (action === "favorite") {
          item.isFavorite = !item.isFavorite;
          showToast(item.isFavorite ? "已加入收藏" : "已取消收藏");
        }
        if (action === "archive") showToast("已发送到本地存档队列");
        state.context = null;
        render();
      }

      function handleBatch(action) {
        if (!state.selectedIds.size) {
          showToast("请先选择书签");
          return;
        }
        if (action === "favorite") {
          bookmarks.filter((item) => state.selectedIds.has(item.id)).forEach((item) => item.isFavorite = true);
          showToast("所选书签已收藏");
          render();
        }
        if (action === "archive") showToast("所选书签已发送到本地存档队列");
      }

      function openNoteDialog() {
        const item = currentBookmark(state.page === "private-detail");
        state.dialog = { type: "note" };
        document.querySelector("#overlay").innerHTML = `<div class="dialog-backdrop" data-action="close-dialog"><section class="dialog" data-dialog-panel><div class="dialog-head"><div><h2>编辑备注</h2><p>备注会显示在首页卡片摘要和详情页。</p></div><button class="icon-button" data-action="close-dialog"><span class="material-symbols-outlined">close</span></button></div><textarea data-note-editor>${escapeHtml(item.note)}</textarea><div class="dialog-actions" style="margin-top:16px"><button class="secondary-button" data-action="close-dialog">取消</button><button class="primary-button" data-action="save-note"><span class="material-symbols-outlined">save</span><span>保存</span></button></div></section></div>`;
      }

      document.addEventListener("click", (event) => {
        const save = event.target.closest("[data-action='save-note']");
        if (!save) return;
        const item = currentBookmark(state.page === "private-detail");
        item.note = document.querySelector("[data-note-editor]").value;
        state.dialog = null;
        showToast("备注已保存");
        render();
      });

      function startImport() {
        const items = parseImportDraft(state.importDraft);
        const task = { id: `imp-${Date.now()}`, name: "Manual paste import", status: "done", total: items.length, imported: items.length, failed: 0, createdAt: now.toISOString(), items: items.map((item) => item.title) };
        importTasks.unshift(task);
        for (const item of items) {
          const id = `bm-import-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
          const bookmark = makeBookmark(id, item.title, item.url, "来自 HTML Demo 导入面板。", false, "f-read", ["t-research"], 82, "high", 1, -1);
          bookmarks.unshift(bookmark);
          versionsByBookmark[id] = makeVersions(bookmark);
        }
        showToast(`已导入 ${items.length} 条书签`);
        routeTo("imports-detail", { taskId: task.id });
      }

      render();
    </script>
  </body>
</html>
