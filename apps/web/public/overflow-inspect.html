<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overflow Inspect</title>
    <style>
      body {
        margin: 0;
        padding: 12px;
        font-family: ui-sans-serif, sans-serif;
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
      }

      iframe {
        width: 390px;
        height: 960px;
        border: 1px solid #ccc;
      }
    </style>
  </head>
  <body>
    <pre id="output">loading...</pre>
    <iframe id="app" src="/demo.html"></iframe>
    <script>
      const output = document.getElementById("output");
      const iframe = document.getElementById("app");

      function selectorFor(el) {
        if (!el || !el.tagName) return "<unknown>";
        const classes = Array.from(el.classList || [])
          .slice(0, 3)
          .map((item) => `.${item}`)
          .join("");
        return el.tagName.toLowerCase() + classes;
      }

      function inspect() {
        const win = iframe.contentWindow;
        const doc = iframe.contentDocument;
        const viewport = win.innerWidth;
        const scroller = doc.scrollingElement || doc.documentElement;
        const items = [];

        for (const el of doc.querySelectorAll("*")) {
          const rect = el.getBoundingClientRect();
          const overflowRight = rect.right - viewport;
          const widthOverflow = el.scrollWidth - el.clientWidth;
          if (overflowRight > 1 || widthOverflow > 20) {
            items.push({
              selector: selectorFor(el),
              overflowRight: Number(overflowRight.toFixed(2)),
              widthOverflow,
              rectLeft: Number(rect.left.toFixed(2)),
              rectRight: Number(rect.right.toFixed(2)),
              rectWidth: Number(rect.width.toFixed(2)),
              text: (el.textContent || "").trim().replace(/\s+/g, " ").slice(0, 80),
            });
          }
        }

        items.sort((a, b) => b.overflowRight - a.overflowRight || b.widthOverflow - a.widthOverflow);
        output.textContent = JSON.stringify({
          viewport,
          scrollWidth: scroller.scrollWidth,
          clientWidth: scroller.clientWidth,
          count: items.length,
          top: items.slice(0, 30),
        }, null, 2);
      }

      iframe.addEventListener("load", () => {
        setTimeout(inspect, 4000);
      });
    </script>
  </body>
</html>
