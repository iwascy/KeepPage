<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>书签卡片预期效果</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
      "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #f4f5f7;
    color: #1f2937;
    -webkit-font-smoothing: antialiased;
    padding: 48px 32px;
  }

  .grid {
    max-width: 1080px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 26px;
    align-items: start;
  }

  .card {
    background: #ffffff;
    border-radius: 24px;
    padding: 18px;
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04),
      0 14px 34px -16px rgba(16, 24, 40, 0.12);
    transition: box-shadow 0.18s ease, transform 0.18s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 1px 2px rgba(16, 24, 40, 0.05),
      0 20px 44px -18px rgba(16, 24, 40, 0.18);
  }

  /* ===== 无封面：左侧大色块 + 右侧文字（横排） ===== */
  .card.is-icon { display: flex; gap: 20px; min-height: 184px; }
  .media {
    width: 144px;
    height: 144px;
    flex-shrink: 0;
    border-radius: 20px;
    overflow: hidden;
    display: grid;
    place-items: center;
  }
  .media .logo {
    width: 96px;
    height: 96px;
    filter: drop-shadow(0 12px 20px rgba(16, 24, 40, 0.30));
  }
  .media.tint-notion {
    background: radial-gradient(
      125% 125% at 28% 22%,
      #e7e0fb 0%, #d2cbf7 36%, #b7c3f3 68%, #a3b6ef 100%
    );
  }
  .media.tint-github {
    background: radial-gradient(
      125% 125% at 28% 22%,
      #f1f3f7 0%, #dfe4ee 52%, #cbd2e0 100%
    );
  }
  .card.is-icon .content { flex: 1; min-width: 0; display: flex; flex-direction: column; }
  .card.is-icon .footer { margin-top: auto; }

  /* ===== 有封面：顶部大图横幅 + 下方文字（竖排） ===== */
  .card.is-cover { display: flex; flex-direction: column; }
  .cover {
    width: 100%;
    height: 168px;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .cover.cover-landscape {
    background: linear-gradient(
      180deg, #bcd8ec 0%, #cfe0e6 34%, #e8dcc4 50%, #9aa886 64%, #5c6b58 100%
    );
    position: relative;
  }
  .cover.cover-landscape::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 45%;
    background: linear-gradient(180deg, rgba(70,84,64,0) 0%, #4a5a48 100%);
  }
  .cover.cover-ai {
    background: radial-gradient(circle at 50% 42%, #6f7bff 0%, #3b2a8c 45%, #120c2e 100%);
    display: grid; place-items: center;
  }
  .cover.cover-ai .ai-core {
    width: 64px; height: 64px; border-radius: 50%;
    background: radial-gradient(circle at 50% 40%, #cdd5ff 0%, #6c7bff 55%, #2b2170 100%);
    box-shadow: 0 0 26px 6px rgba(120, 138, 255, 0.55);
    display: grid; place-items: center;
    font-weight: 700; font-size: 18px; color: #fff; letter-spacing: 0.5px;
  }

  /* ---------- 文字区（两种布局共用） ---------- */
  .head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .domain {
    font-size: 14px;
    font-weight: 600;
    color: #6b7280;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .time {
    font-size: 14px;
    color: #aab1bd;
    flex-shrink: 0;
  }

  .titlerow {
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .title {
    flex: 1;
    min-width: 0;
    font-size: 19px;
    font-weight: 600;
    line-height: 1.42;
    color: #1f2533;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  /* 横排卡：标题占满整行，操作栏单独贴底 */
  .card.is-icon .titlerow { display: block; }
  .card.is-icon .footer {
    padding-top: 16px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 6px;
  }
  /* 竖排卡：标题与操作栏同一行 */
  .card.is-cover .actions {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .iconbtn {
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 50%;
    background: transparent;
    color: #9aa3b2;
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .iconbtn:hover { background: #f1f2f4; color: #4b5563; }
  .iconbtn svg { width: 20px; height: 20px; }

  @media (max-width: 760px) {
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <div class="grid">

    <!-- 1. 无封面 · Notion（左侧大色块横排） -->
    <article class="card is-icon">
      <div class="media tint-notion">
        <svg class="logo" viewBox="0 0 64 64">
          <rect x="9" y="6" width="46" height="52" rx="9" fill="#0f0f0f"/>
          <text x="32" y="45" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="36" font-weight="700" fill="#fff">N</text>
        </svg>
      </div>
      <div class="content">
        <div class="head">
          <span class="domain">notion.so</span>
          <span class="time">1 个月前</span>
        </div>
        <div class="titlerow">
          <div class="title">Notion – The all-in-one workspace for your notes, tasks, wikis, and…</div>
        </div>
        <div class="footer">
          <button class="iconbtn" title="收藏">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">
              <path d="M12 3l2.7 5.6 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.9 1-6.1L3.2 9.5l6.1-.9z"/>
            </svg>
          </button>
          <button class="iconbtn" title="更多">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
            </svg>
          </button>
        </div>
      </div>
    </article>

    <!-- 2. 有封面 · 小红书（顶部大图横幅竖排） -->
    <article class="card is-cover">
      <div class="cover cover-landscape"></div>
      <div class="head">
        <span class="domain">xiaohongshu.com</span>
        <span class="time">6 天前</span>
      </div>
      <div class="titlerow">
        <div class="title">小红书 – 你的生活兴趣社区</div>
        <div class="actions">
          <button class="iconbtn" title="收藏">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">
              <path d="M12 3l2.7 5.6 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.9 1-6.1L3.2 9.5l6.1-.9z"/>
            </svg>
          </button>
          <button class="iconbtn" title="更多">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
            </svg>
          </button>
        </div>
      </div>
    </article>

    <!-- 3. 无封面 · GitHub（左侧大色块横排） -->
    <article class="card is-icon">
      <div class="media tint-github">
        <svg class="logo" viewBox="0 0 24 24" fill="#1f2328">
          <path d="M12 1.5a10.5 10.5 0 0 0-3.32 20.46c.52.1.71-.22.71-.5v-1.9c-2.9.63-3.52-1.24-3.52-1.24-.47-1.2-1.16-1.52-1.16-1.52-.95-.65.07-.64.07-.64 1.05.07 1.6 1.08 1.6 1.08.93 1.6 2.45 1.14 3.05.87.09-.68.36-1.14.66-1.4-2.32-.26-4.76-1.16-4.76-5.16 0-1.14.4-2.07 1.07-2.8-.1-.27-.46-1.34.1-2.78 0 0 .88-.28 2.88 1.07a9.9 9.9 0 0 1 5.24 0c2-1.35 2.87-1.07 2.87-1.07.57 1.44.21 2.51.1 2.78.67.73 1.07 1.66 1.07 2.8 0 4.01-2.45 4.9-4.78 5.15.38.32.71.95.71 1.92v2.85c0 .28.19.61.72.5A10.5 10.5 0 0 0 12 1.5Z"/>
        </svg>
      </div>
      <div class="content">
        <div class="head">
          <span class="domain">github.com</span>
          <span class="time">5 天前</span>
        </div>
        <div class="titlerow">
          <div class="title">yizhiyanhua-ai / fireworks-tech-graph: Generate production-quality SVG…</div>
        </div>
        <div class="footer">
          <button class="iconbtn" title="收藏">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">
              <path d="M12 3l2.7 5.6 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.9 1-6.1L3.2 9.5l6.1-.9z"/>
            </svg>
          </button>
          <button class="iconbtn" title="更多">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
            </svg>
          </button>
        </div>
      </div>
    </article>

    <!-- 4. 有封面 · ParHom（顶部大图横幅竖排） -->
    <article class="card is-cover">
      <div class="cover cover-ai"><div class="ai-core">AI</div></div>
      <div class="head">
        <span class="domain">pay.ldxp.cn</span>
        <span class="time">上个月</span>
      </div>
      <div class="titlerow">
        <div class="title">ParHom 的小店 - 链动小铺</div>
        <div class="actions">
          <button class="iconbtn" title="收藏">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round">
              <path d="M12 3l2.7 5.6 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.9 1-6.1L3.2 9.5l6.1-.9z"/>
            </svg>
          </button>
          <button class="iconbtn" title="更多">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/>
            </svg>
          </button>
        </div>
      </div>
    </article>

  </div>
</body>
</html>
